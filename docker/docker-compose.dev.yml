services:
  web:
    build:
      context: ..
      dockerfile: docker/web.dev.dockerfile
    volumes:
      - ..:/usr/src/app/
    ports:
      - 8080:8080
    env_file:
      - ./.env.dev
    depends_on:
      - db
      - plausible
    environment:
      - "DEBUG=1"
      - "PLAUSIBLE_URL=http://localhost:8001"

  db:
    image: postgres:15
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    environment:
      - POSTGRES_USER=minidebug
      - POSTGRES_PASSWORD=minidebug
      - POSTGRES_DB=minidebug_db

  plausible_db:
    image: postgres:15
    volumes:
      - plausible_db_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=plausible
      - POSTGRES_PASSWORD=plausible
      - POSTGRES_DB=plausible_db

  plausible_events_db:
    image: clickhouse/clickhouse-server:24.3.3.102-alpine
    volumes:
      - plausible_events_data:/var/lib/clickhouse
      - ./plausible/clickhouse-config.xml:/etc/clickhouse-server/config.d/logging.xml:ro
      - ./plausible/clickhouse-user-config.xml:/etc/clickhouse-server/users.d/logging.xml:ro
    ulimits:
      nofile:
        soft: 262144
        hard: 262144

  plausible:
    image: ghcr.io/plausible/community-edition:v2.1.1
    command: sh -c "sleep 10 && /entrypoint.sh db createdb && /entrypoint.sh db migrate && /entrypoint.sh run"
    depends_on:
      - plausible_db
      - plausible_events_db
    ports:
      - 8001:8000
    environment:
      - BASE_URL=http://localhost:8001
      - SECRET_KEY_BASE=afM7Py4zXe9vt5fT3VD+FWGzsXyCNE+xAQsIzunXdvFLz5SNb65G2iMETGx9PQbpMLmMnFTb+2vOLT8JEk49bg==
      - TOTP_VAULT_KEY=O1cxHdDRTCyaya/zXHtLOdgquCDa5ov7g5d2pdSyTc8=
      - DATABASE_URL=postgres://plausible:plausible@plausible_db:5432/plausible_db
      - CLICKHOUSE_DATABASE_URL=http://plausible_events_db:8123/plausible_events_db

volumes:
  postgres_data:
  plausible_db_data:
  plausible_events_data:
