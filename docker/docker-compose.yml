services:
  web:
    build:
      dockerfile: docker/web.dockerfile
      context: ..
    expose:
      - 8000
    env_file:
      - ./.env.prod
    secrets:
      - SECRET_KEY
      - DB_USER
      - DB_PASSWORD
      - DB_HOST
      - DB_NAME
      - ALLOWED_HOSTS
      - PLAUSIBLE_URL
      - PLAUSIBLE_DOMAIN
    volumes:
      - static_volume:/usr/src/app/static
    depends_on:
      - redis
      - postgres
    labels:
      ofelia.enabled: "true"
      ofelia.job-exec.githubcron.schedule: "@every 1d"
      ofelia.job-exec.githubcron.command: "/bin/minigrim0 >> minigrim0.log && python manage.py fetchrepositories >> repo.log"
      ofelia.job-exec.githubcron.timezone: "Europe/Stockholm"
    restart: unless-stopped
    networks:
      - private

  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    volumes:
      - static_volume:/srv/static
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.minigrim0-web-insecure.entrypoints=http"
      - "traefik.http.routers.minigrim0-web-insecure.rule=Host(`minigrim0.xyz`)"
      - "traefik.http.middlewares.minigrim0-web-redirect.redirectscheme.scheme=https"
      - "traefik.http.routers.minigrim0-web-insecure.middlewares=minigrim0-web-redirect"
      - "traefik.http.routers.minigrim0-web.entrypoints=https"
      - "traefik.http.routers.minigrim0-web.rule=Host(`minigrim0.xyz`)"
      - "traefik.http.routers.minigrim0-web.tls=true"
      - "traefik.http.routers.minigrim0-web.tls.certresolver=http"
      - "traefik.http.routers.minigrim0-web.service=nginx-minigrim0-web"
      - "traefik.docker.network=traefik-proxy"
    depends_on:
      - web
    networks:
      - traefik-proxy
      - private
    restart: unless-stopped

  postgres:
    image: postgres:15
    env_file:
      - ./.env.prod.db
    secrets:
      - DB_PASSWORD
    environment:
      - POSTGRES_PASSWORD_FILE=/run/secrets/DB_PASSWORD
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    restart: unless-stopped
    networks:
      - private

  redis:
    image: redis:alpine
    volumes:
      - redis_data:/data
    expose:
      - 6379
    restart: unless-stopped
    networks:
      - private

  ofelia:
    image: mcuadros/ofelia:latest
    command: daemon --docker
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    restart: unless-stopped
    depends_on:
      - web
    networks:
      - private

volumes:
  static_volume:
  postgres_data:
  redis_data:

networks:
  traefik-proxy:
    external: true
  private:
    driver: overlay
    attachable: true

secrets:
  SECRET_KEY:
    external: true
  DB_USER:
    external: true
  DB_PASSWORD:
    external: true
  DB_HOST:
    external: true
  DB_NAME:
    external: true
  ALLOWED_HOSTS:
    external: true
  PLAUSIBLE_URL:
    external: true
  PLAUSIBLE_DOMAIN:
    external: true
